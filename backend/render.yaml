services:
  - type: web
    name: intellimoney-api
    runtime: python
    rootDir: backend
    healthCheckPath: /healthz
    buildCommand: |
      pip install -r requirements.txt &&
      python -c "
      import subprocess, sys
      result = subprocess.run([sys.executable, '../ml/train_model.py'], capture_output=True, text=True, cwd='..')
      print(result.stdout)
      if result.returncode != 0:
          print(result.stderr, file=sys.stderr)
          sys.exit(1)
      p = __import__('pathlib').Path('app/ml/expense_classifier.joblib')
      assert p.exists(), f'Model not found at {p.resolve()}'
      m = __import__('joblib').load(p)
      print(f'Model verified OK: {type(m).__name__}, classes={list(m.classes_)}')
      "
    startCommand: python start.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: APP_NAME
        value: IntelliMoney
      - key: ENVIRONMENT
        value: production
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB
        value: IntelliMoney
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: BANK_ENCRYPTION_KEY
        sync: false
      - key: BANK_CONSENT_REDIRECT_BASE
        value: https://intellimoney.vercel.app/connect-bank/consent
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://intellimoney.vercel.app,http://localhost:5173
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
