services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    profiles:
      - with-redis

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    env_file: backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      HF_HOME: /cache/huggingface
    volumes:
      - backend_uploads:/app/uploads
      - huggingface_cache:/cache/huggingface
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  seed:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    profiles:
      - with-seed
    env_file: backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      HF_HOME: /cache/huggingface
    volumes:
      - huggingface_cache:/cache/huggingface
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: ["python", "scripts/seed_demo.py"]

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3002:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  mongodb_data:
  backend_uploads:
  huggingface_cache:
