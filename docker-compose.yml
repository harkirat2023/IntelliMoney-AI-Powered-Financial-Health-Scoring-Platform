services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    env_file: backend/.env
    environment:
      FRONTEND_ORIGIN: http://localhost:3002
    volumes:
      - ./backend:/app
      - ./ml:/app/ml

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
