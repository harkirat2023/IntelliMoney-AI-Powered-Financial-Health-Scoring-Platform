name: ML Pipeline

on:
  schedule:
    - cron: "0 2 * * 0"  # Weekly on Sunday 2am
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install scikit-learn pandas joblib
      - run: python train_model.py
      - uses: actions/upload-artifact@v4
        with:
          name: expense_classifier
          path: backend/app/ml/expense_classifier.joblib
